site_name: Mridul Khanna
site_description: Economist & Quantitative Developer - Applied Microeconometrics, Development Economics, Algorithmic Trading
site_url: https://mridlll.github.io/portfolio
repo_url: https://github.com/Mridlll

theme:
  name: material
  palette:
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font: false  # We load fonts via custom CSS
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.footer
    - toc.integrate
    - content.code.copy
  icon:
    repo: fontawesome/brands/github

extra_css:
  - stylesheets/custom.css

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Mridlll

nav:
  - Home: index.md
  - Economics Research: research.md
  - Quantitative Finance: quant.md
  - Data Engineering: data.md
  - About: about.md
